pilot_id: "pilot_001"
pilot_name: "Donation Collective Choice"

# Topic Definition
topic:
  description: |
    In this study, you will take part in a collective decision about how to allocate a charitable donation. You will be asked to decide which charity should receive a $10 donation.
    Several charities are working on different approaches to addressing social problems. Each of them uses donations in different ways and focuses on different types of impact.
    In an anonymous conversation with a neutral AI assistant, you will be asked to rank the options and briefly explain why exactly you prefer your top choice. After everyone in the group makes their choice, the charity that receives the most support will be selected as the winner.
  options:
    - "animal_rescue"
    - "food_pantry"
    - "urban_tree"
    - "community_clinic"
  option_labels:
    animal_rescue: "Community Animal Rescue Shelter"
    food_pantry: "Community Food Pantry Network"
    urban_tree: "Urban Tree Initiative"
    community_clinic: "Community Health Clinic"

# Session Configuration
expected_participants: 4  # Monitor stops and saves transcript when this many users have completed Phase 1

# Extraction & Rephrasing
extraction:
  model: "gpt-4o"               # Model used to extract vote rankings and reasoning from transcripts
  rephrasing_model: "gpt-4o"    # Model used to rephrase raw answers during monitoring
  ranking_null_if_ambiguous: true  # If the user never clearly gave a full ranking, store null rather than guessing

# Embedding Configuration
embedding_model: "text-embedding-3-small"

# API Settings
api_sleep_seconds: 3
model: "gpt-4o"  # Default model for general use

# Random Seed (optional, for reproducibility)
# random_seed: 42
